<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manage Games - GameTracker</title>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background-color: #f8fafc; margin: 0; padding: 40px; color: #0f172a; }
        .container { max-width: 800px; margin: 0 auto; }
        .card { background: white; border: 1px solid #e2e8f0; border-radius: 12px; padding: 32px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05); margin-bottom: 24px; }
        h2 { margin-top: 0; font-size: 24px; color: #1e293b; }
        .back-link { text-decoration: none; color: #4f46e5; font-weight: 500; display: inline-block; margin-bottom: 24px; }
        .back-link:hover { text-decoration: underline; }
        
        .form-group { display: flex; gap: 12px; margin-top: 20px; }
        input[type="text"] { flex: 1; padding: 12px; border: 1px solid #cbd5e1; border-radius: 6px; font-size: 15px; }
        input[type="text"]:focus { outline: none; border-color: #6366f1; box-shadow: 0 0 0 3px rgba(99,102,241,0.1); }
        
        .btn { padding: 12px 20px; font-size: 14px; font-weight: 600; border-radius: 6px; cursor: pointer; border: none; color: white; transition: background 0.15s; }
        .btn-add { background: #4f46e5; }
        .btn-add:hover { background: #4338ca; }
        .btn-delete { background: #ef4444; padding: 6px 12px; font-size: 12px; }
        .btn-delete:hover { background: #dc2626; }
        
        table { width: 100%; border-collapse: collapse; text-align: left; margin-top: 10px; }
        th { font-size: 13px; font-weight: 600; text-transform: uppercase; color: #64748b; padding: 14px 16px; background: #f8fafc; border-bottom: 1px solid #e2e8f0; }
        td { padding: 14px 16px; border-bottom: 1px solid #f1f5f9; font-size: 15px; }
        tr:hover td { background-color: #fafafa; }
    </style>
</head>
<body>
    <div class="container">
        <a href="/dashboard" class="back-link">← Back to System Dashboard</a>
        
        <!-- Section 1: Add Game Form -->
        <div class="card">
            <h2>Add New Game to Catalog</h2>
            <p style="color: #64748b; margin-top: -8px;">New additions instantly become selectable values for all users.</p>
            <form action="/admin/games/add" method="post" class="form-group">
                <input type="text" name="game_name" placeholder="e.g., Cyberpunk 2077, Hollow Knight" required autocomplete="off">
                <button type="submit" class="btn btn-add">Add Game Title</button>
            </form>
        </div>

        <!-- Section 2: Catalog Roster -->
        <div class="card">
            <h2>Global Game Catalog ({{ games|length }})</h2>
            <table>
                <thead>
                    <tr>
                        <th>System Index ID</th>
                        <th>Game Title</th>
                        <th style="text-align: right;">Actions</th>
                    </tr>
                </thead>
                <tbody>
                    {% for g in games %}
                        <tr>
                            <td style="color: #94a3b8; font-family: monospace;">#{{ g.id }}</td>
                            <td><strong>{{ g.name }}</strong></td>
                            <td style="text-align: right;">
                                <form action="/admin/games/delete/{{ g.id }}" method="post" style="margin: 0;" onsubmit="return confirm('Are you sure you want to remove this game from the platform selection tool?');">
                                    <button type="submit" class="btn btn-delete">Remove</button>
                                </form>
                            </td>
                        </tr>
                    {% endfor %}
                </tbody>
            </table>
        </div>
    </div>
</body>
</html>
